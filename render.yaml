services:
  - type: web
    name: film-archive-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./data/film_archive.db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://guojunshuo47-lang.github.io,https://*.github.io,http://localhost:5500,http://127.0.0.1:5500,null
      - key: DEBUG
        value: false
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
