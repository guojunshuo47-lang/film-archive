version: '3.8'

services:
  backend:
    build: ./backend
    container_name: film-archive-backend
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/film_archive.db}
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-this-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5500,http://127.0.0.1:5500}
      - DEBUG=${DEBUG:-false}
    restart: unless-stopped
