version: '3.8'

services:
  backend:
    build: ./backend
    container_name: film-archive-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///./data/film_archive.db
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-this-in-production}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500
      - DEBUG=false
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: film-archive-frontend
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  film_data:
