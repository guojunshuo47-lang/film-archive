server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver required for dynamic proxy_pass to external HTTPS host
    resolver 8.8.8.8 valid=30s ipv6=off;

    # Proxy /sb-api/ to Supabase Edge Functions.
    # Set SUPABASE_HOST in your environment (e.g. abcdefgh.supabase.co).
    # If using envsubst to render this file, replace the literal below.
    location /sb-api/ {
        set $supabase_host "${SUPABASE_HOST}";
        rewrite ^/sb-api/(.*)$ /$1 break;
        proxy_pass https://$supabase_host;
        proxy_ssl_server_name on;
        proxy_set_header Host $supabase_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
